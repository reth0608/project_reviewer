name: Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install fastapi uvicorn PyGithub docker "langgraph>=0.1.0" "langchain-google-genai>=2.0.0" langsmith python-dotenv pydantic httpx "pyjwt[crypto]" tree-sitter tree-sitter-python ruff mypy pytest pytest-asyncio
      - name: Lint
        run: ruff check agent/ sandbox/ evals/ tests/
      - name: Type check
        run: mypy agent/ sandbox/ evals/ --ignore-missing-imports
      - name: Unit tests
        run: pytest tests/ -v
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
